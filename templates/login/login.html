{% extends 'base.html' %}

{% block title %}Login - FoodRescue{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-lg shadow-md p-8">
        <h2 class="text-2xl font-bold text-center mb-6">Login to FoodRescue</h2>
        
        {% if form.errors %}
            <div class="bg-red-100 text-red-700 p-4 rounded mb-4">
                <p>Please enter a correct username and password. Note that both fields may be case-sensitive.</p>
            </div>
        {% endif %}

        <form method="post" class="space-y-4">
            <input type="hidden" name="csrfmiddlewaretoken" value="{{csrf_token}}">
            <div>
                <label for="id_username" class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" name="username" id="id_username" 
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500"
                       required autofocus>
            </div>
            <div>
                <label for="id_password" class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password" id="id_password" 
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-500 focus:border-green-500"
                       required>
            </div>
            <button type="submit" class="w-full bg-green-600 text-white py-2 px-4 rounded hover:bg-green-700">
                Login
            </button>
        </form>
        
        <p class="text-center mt-4 text-sm text-gray-600">
            Don't have an account? <a href="{% url 'register' %}" class="text-green-600 hover:text-green-700">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
