{% extends 'base.html' %} {% block title %}Register business - FoodRescue{%
endblock %} {% block content %}
<h1 class="text-3xl font-bold mb-8">Register Your business</h1>

<form method="post" class="max-w-lg">
  {% csrf_token %}
  <div class="mb-4">
    <label class="block text-gray-700 mb-2">business Name</label>
    <input type="text" name="name" required class="w-full border p-2 rounded" />
  </div>
  <div class="mb-4">
    <label class="block text-gray-700 mb-2">Address</label>
    <textarea
      name="address"
      rows="2"
      required
      class="w-full border p-2 rounded"
    ></textarea>
  </div>
  <div class="mb-4">
    <label class="block text-gray-700 mb-2">Phone Number</label>
    <input
      type="text"
      name="phone"
      required
      class="w-full border p-2 rounded"
    />
  </div>
  <div class="mb-4">
    <label class="block text-gray-700 mb-2">Description (optional)</label>
    <textarea
      name="description"
      rows="3"
      class="w-full border p-2 rounded"
    ></textarea>
  </div>
  <button
    type="submit"
    class="bg-green-600 text-white px-6 py-3 rounded hover:bg-green-700"
  >
    Create business
  </button>
</form>
{% endblock %}
